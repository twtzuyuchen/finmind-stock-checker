<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個股融資維持率查詢列表</title>
<style>
  body { font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
         background:#0f1420; color:#e7ecf7; display:flex; align-items:center; justify-content:center;
         min-height:100vh; margin:0; text-align:center; padding:20px; }
  .box { max-width: 480px; }
  h1 { font-size:1.3rem; }
  p { color:#93a0bd; line-height:1.7; font-size:0.9rem; }
  code { color:#e7ecf7; }
</style>
</head>
<body>
  <div class="box">
    <h1>尚未查詢過任何個股</h1>
    <p>這是初始佔位頁面。到 GitHub Actions 頁面手動觸發「查詢個股融資維持率明細」
      (Run workflow)，輸入股票代號後，這裡就會自動列出查詢過的個股，
      點進去可以看逐日融資成本回推明細。也可以在自己電腦執行
      <code>python scripts/check_stock.py 股票代號</code> 產生。</p>
  </div>
</body>
